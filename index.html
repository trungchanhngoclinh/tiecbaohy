<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tiệc báo hỷ
    Trung Chánh & Ngọc Linh</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nhạc nền -->
  <audio id="bg-music" src="music.mp3" autoplay loop></audio>

  <!-- Thiệp cưới -->
  <div class="card" id="weddingCard">
    <div class="card-left">
      <div class="front">
        <h1>Ngọc Ánh</h1>
        <p class="date">24/05/2026</p>
      </div>
    </div>
    <div class="card-right">
      <div class="front">
        <h1>Thế Bảo</h1>
        <p class="date">24/05/2026</p>
      </div>
    </div>
    <div class="inside">
      <h2>Lời mời</h2>
      <p>Trân trọng kính mời em Huy đến dự lễ cưới cùng gia đình chúng tôi.</p>
      <p>誠邀您參加我們的婚禮</p>
      <p>私たちの結婚式にご参加ください</p>
      <img src="images/chibi.png" alt="Chibi Couple" class="chibi">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
